name: cicd_use-secret 

on:
  workflow_dispatch:
    inputs:
      blob_url:
        description: "URL of artifact.zip（without SAS；SAS is stored inside secret: BLOB_SAS_TOKEN）"
        required: true
        type: string
      mode:
        description: "vuln or hardened"
        required: true
        default: vuln
        type: choice
        options: [vuln, hardened]
      tamper:
        description: "whether to tamper after download"
        required: false
        default: false
        type: boolean


permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Prepare workspace
        run: |
          set -euo pipefail
          mkdir -p sim_leaks logs

      - name: (Simulate) secret persistence (vuln path)
        env:
          SAS_TOKEN: ${{ secrets.BLOB_SAS_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.mode }}" = "vuln" ]; then
            echo "curl '${{ inputs.blob_url }}?${SAS_TOKEN}' -o artifact.zip" >> sim_leaks/.bash_history
            echo "simulated bash history with SAS written"
          else
            echo "no secret persistence in hardened mode" > logs/secret_usage.log
          fi

      - name: Fetch artifact
        env:
          SAS_TOKEN: ${{ secrets.BLOB_SAS_TOKEN }}
        run: |
          set -euo pipefail
          URL="${{ inputs.blob_url }}"
          if [ -n "${SAS_TOKEN:-}" ]; then URL="${URL}?${SAS_TOKEN}"; fi
          curl --fail --silent --show-error "$URL" -o artifact.zip
          unzip -q artifact.zip -d .

      - name: Simulate tamper (optional)
        if: ${{ inputs.tamper == true }}
        run: |
          set -euo pipefail
          echo "# SIMULATED_TAMPER" >> artifact/malicious.py
          echo "Tamper marker added."

      - name: Verify (hardened only)
        if: ${{ inputs.mode == 'hardened' }}
        env:
          EXPECTED_SHA256: ${{ secrets.ARTIFACT_SHA256 }}
        run: |
          set -euo pipefail
          if [ -n "${EXPECTED_SHA256:-}" ]; then
            ACT="$(sha256sum artifact.zip | awk '{print $1}')"
            echo "Actual:   $ACT"
            echo "Expected: $EXPECTED_SHA256"
            test "$ACT" = "$EXPECTED_SHA256"
          else
            echo "No EXPECTED_SHA256 provided; skipping hash check"
          fi
          if grep -q "SIMULATED_TAMPER" artifact/malicious.py; then
            echo "Policy: tamper marker detected; failing."
            exit 1
          fi
          if ! head -n 5 artifact/malicious.py | grep -q "SIMULATED BENIGN PAYLOAD"; then
            echo "Policy: unexpected payload header; failing."
            exit 1
          fi

      - name: Deploy (execute benign payload)
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          python artifact/malicious.py
          cat artifact/artifact_execution_report.json || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cicd_use-secret-logs
          path: |
            sim_leaks
            logs
            artifact/artifact_execution_report.json
          if-no-files-found: warn