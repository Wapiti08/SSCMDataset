name: malicious-build

on:
  workflow_dispatch:
  push:
    paths:
      - "artifact/**"
      - "scripts/malicious_build.py"
      - "scripts/package_artifact.sh"

permissions:
  contents: read


jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Inject benign marker (simulate build-time tamper)
        run: |
          set -euo pipefail
          python scripts/malicious_build.py
          echo "Build injection simulated."

      - name: Package artifact
        run: |
          set -euo pipefail
          bash scripts/package_artifact.sh
          echo "sha256: $(cat dist/artifact.sha256)"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-zip
          path: dist/artifact.zip

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: malicious-build-logs
          path: |
            logs/build_audit.json
            logs/package.json
            dist/artifact.sha256
          if-no-files-found: warn
