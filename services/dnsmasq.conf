# /etc/dnsmasq.conf

# Listen on all interfaces
interface=eth0

# Bind to the interface, not the IP
bind-interfaces

# Domain name for DHCP leases
domain=mydomain.local

# DNS server to be used
server=8.8.8.8
server=8.8.4.4

# Do not poll /etc/resolv.conf for changes
no-poll

# Use the local system's /etc/hosts file
addn-hosts=/etc/dnsmasq.hosts

# Enable the DHCP server
dhcp-range=192.168.1.50,192.168.1.150,12h

# DHCP options
dhcp-option=option:router,192.168.1.1
dhcp-option=option:ntp-server,192.168.1.1
dhcp-option=option:dns-server,192.168.1.1

# Set the default gateway
dhcp-option=3,192.168.1.1

# DHCP lease file location
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Log DHCP queries
log-dhcp

# Enable DNS caching
cache-size=1000